name: Order Repository CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  order-test:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0

        env:
          MYSQL_DATABASE: orders_db
          MYSQL_ROOT_PASSWORD: rajasoN@0073

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prajasoN@0073"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Order Suite
        run: ./gradlew orderSuite --rerun-tasks --info
        continue-on-error: true

        env:
          JAVA_TOOL_OPTIONS: >
            -DDB_JDBC_URL=jdbc:mysql://localhost:3306/orders_db
            -DDB_USER=root
            -DDB_PASSWORD=rajasoN@0073
            -Dallure.results.directory=build/allure-results

      - name: Upload Test Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: build/logs/test.log

      - name: Verify Allure Results
        run: |
          if [ ! -d build/allure-results ] || [ -z "$(ls -A build/allure-results 2>/dev/null)" ]; then
            echo "::error::No Allure results found"
            exit 1
          fi

      - name: Checkout gh-pages
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_history: allure-history
          allure_report: allure-report
          keep_reports: 20
          gh_pages: gh-pages

      - name: Remove Nested Git
        if: always()
        run: sudo rm -rf allure-history/.git

      - name: Publish Allure
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Fail if Tests Failed
        if: always()
        run: |
          if [ -d build/reports/tests ] && grep -rl "FAILED" build/reports/tests --include="*.html" > /dev/null 2>&1; then
            exit 1
          fi