name: Order Repository CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  order-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: orders_db
          MYSQL_ROOT_PASSWORD: rajasoN@0073
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prajasoN@0073"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission for gradlew
        run: chmod +x gradlew

      - name: Run Order Test Suite
        run: ./gradlew exercise1Test exercise2Test exercise3Test milestoneTest allureReportInsightTest --info
        continue-on-error: true
        env:
          JAVA_TOOL_OPTIONS: >
            -DDB_JDBC_URL=jdbc:mysql://localhost:3306/orders_db
            -DDB_USER=root
            -DDB_PASSWORD=rajasoN@0073
            -Dallure.results.directory=build/allure-results

      - name: Verify Allure results were generated
        run: |
          if [ ! -d build/allure-results ] || [ -z "$(ls -A build/allure-results 2>/dev/null)" ]; then
            echo "::error::build/allure-results is empty. Add 'testImplementation(\"io.qameta.allure:allure-junit5:\$allureVersion\")' to build.gradle.kts."
            exit 1
          fi
          echo "Found $(ls build/allure-results | wc -l) files in allure-results"

      - name: Get previous Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report with history
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: build/allure-results
          allure_history: allure-history
          allure_report: allure-report
          keep_reports: 20
          gh_pages: gh-pages

      - name: Remove nested .git left inside allure-history
        if: always()
        run: sudo rm -rf allure-history/.git

      - name: Verify Allure history was populated
        run: |
          if [ ! -d allure-history ] || [ -z "$(ls -A allure-history 2>/dev/null)" ]; then
            echo "::error::allure-history is empty after report generation. Check the 'Build Allure report' step logs above."
            exit 1
          fi
          echo "allure-history contains $(find allure-history -type f | wc -l) files"

      - name: Publish Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Fail job if tests failed
        if: always()
        run: |
          if [ -d build/reports/tests ] && grep -rl "FAILED" build/reports/tests --include="*.html" > /dev/null 2>&1; then
            echo "Tests failed - see Allure report link above"
            exit 1
          fi